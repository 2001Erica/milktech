<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MilkTech</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f7fb;
padding:15px;
color:#1e293b;
}

/* TOPO */

.topbar{
background:#1e1b4b;
padding:18px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
font-size:22px;
font-weight:bold;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card h2{
font-size:14px;
margin-bottom:10px;
color:#64748b;
}

.card p{
font-size:28px;
font-weight:bold;
}

/* CADASTRO */

.cadastro{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.cadastro h2{
margin-bottom:15px;
font-size:18px;
}

input{
width:100%;
padding:15px;
margin-bottom:12px;
border:none;
background:#f1f5f9;
border-radius:14px;
}

.botao{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#6366f1;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* ANIMAIS */

.lista{
display:flex;
flex-direction:column;
gap:15px;
padding-bottom:100px;
}

.animal{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.animal h2{
margin-bottom:10px;
}

.animal p{
margin-bottom:15px;
color:#64748b;
}

.acoes{
display:flex;
gap:10px;
}

.editar,
.excluir{
flex:1;
padding:12px;
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
}

.editar{
background:#3b82f6;
}

.excluir{
background:#ef4444;
}

/* MENU INFERIOR */

.bottom{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:white;
border-radius:20px;
padding:15px;
display:flex;
justify-content:space-around;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.bottom button{
border:none;
background:none;
font-size:14px;
font-weight:bold;
color:#64748b;
cursor:pointer;
}

/* TELAS */

.tela{
display:none;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
🐄 MilkTech
</div>

<div>
🔔
</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tela">

<div class="cards">

<div class="card">
<h2>Total Animais</h2>
<p id="totalAnimais">0</p>
</div>

<div class="card">
<h2>Leite Hoje</h2>
<p id="totalLeite">0L</p>
</div>

<div class="card">
<h2>Alertas</h2>
<p>4</p>
</div>

<div class="card">
<h2>Vacinação</h2>
<p>1</p>
</div>

</div>

</div>

<!-- ANIMAIS -->

<div id="animaisTela" class="tela">

<div class="cadastro">

<h2>Cadastrar Animal</h2>

<input
id="nome"
placeholder="Nome do animal"
>

<input
id="leite"
placeholder="Litros de leite"
>

<button
class="botao"
onclick="cadastrar()"
>

Cadastrar

</button>

</div>

<div
class="lista"
id="resultado"
>

</div>

</div>

<!-- PRODUÇÃO -->

<div id="producaoTela" class="tela">

<div class="cadastro">

<h2>Produção</h2>

<input placeholder="Animal">

<input placeholder="Litros">

<input placeholder="Data">

<button class="botao">
Salvar Produção
</button>

</div>

</div>

<!-- FINANCEIRO -->

<div id="financeiroTela" class="tela">

<div class="cards">

<div class="card">
<h2>Faturamento</h2>
<p>R$ 12.500</p>
</div>

<div class="card">
<h2>Despesas</h2>
<p>R$ 4.200</p>
</div>

</div>

</div>

<!-- MENU -->

<div class="bottom">

<button onclick="mostrarDashboard()">
🏠
</button>

<button onclick="mostrarAnimais()">
🐄
</button>

<button onclick="mostrarProducao()">
🥛
</button>

<button onclick="mostrarFinanceiro()">
💰
</button>

</div>

<script>

/* TELAS */

function esconderTudo(){

document.getElementById('dashboard').style.display='none';
document.getElementById('animaisTela').style.display='none';
document.getElementById('producaoTela').style.display='none';
document.getElementById('financeiroTela').style.display='none';

}

function mostrarDashboard(){

esconderTudo();

document.getElementById('dashboard').style.display='block';

}

function mostrarAnimais(){

esconderTudo();

document.getElementById('animaisTela').style.display='block';

}

function mostrarProducao(){

esconderTudo();

document.getElementById('producaoTela').style.display='block';

}

function mostrarFinanceiro(){

esconderTudo();

document.getElementById('financeiroTela').style.display='block';

}

/* BUSCAR */

async function buscarAnimais(){

const resposta =
await fetch('http://localhost:3000/animais');

const dados =
await resposta.json();

let html = '';

let totalLeite = 0;

dados.forEach(animal => {

totalLeite += Number(animal.leite);

html += `

<div class="animal">

<h2>${animal.nome}</h2>

<p>🥛 ${animal.leite} litros</p>

<div class="acoes">

<button
class="editar"
onclick="editar(${animal.id})"
>
Editar
</button>

<button
class="excluir"
onclick="excluirAnimal(${animal.id})"
>
Excluir
</button>

</div>

</div>

`;

});

document.getElementById('resultado').innerHTML =
html;

document.getElementById('totalAnimais').innerHTML =
dados.length;

document.getElementById('totalLeite').innerHTML =
totalLeite + 'L';

}

/* CADASTRAR */

async function cadastrar(){

const nome =
document.getElementById('nome').value;

const leite =
document.getElementById('leite').value;

await fetch('http://localhost:3000/animais', {

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
nome,
leite
})

});

document.getElementById('nome').value='';
document.getElementById('leite').value='';

buscarAnimais();

}

/* EDITAR */

async function editar(id){

const novoNome =
prompt('Novo nome');

const novoLeite =
prompt('Novo leite');

await fetch(`http://localhost:3000/animais/${id}`, {

method:'PUT',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

nome:novoNome,
leite:novoLeite

})

});

buscarAnimais();

}

/* EXCLUIR */

async function excluirAnimal(id){

await fetch(`http://localhost:3000/animais/${id}`, {

method:'DELETE'

});

buscarAnimais();

}

/* INICIAR */

buscarAnimais();

mostrarDashboard();

</script>

</body>
</html>
